<!DOCTYPE html>
<html>
<head>
<style>
body {
margin: 0;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background: radial-gradient(circle at top, #1f1f2a 0%, #0b0b10 55%, #050507 100%);
color: #e5e7eb;
}

.pricing {
width: 300px;
background: linear-gradient(180deg, #151521 0%, #101019 100%);
box-shadow: 0 18px 45px rgba(0, 0, 0, 0.5);
border: 1px solid #232337;
border-radius: 14px;
padding: 20px;
text-align: left;
display: flex;
flex-direction: column;
min-height: 260px;
gap: 10px;
}

.title {
font-size: 24px;
font-weight: 700;
letter-spacing: 0.2px;
margin: 0;
color: #f5f5ff;
}

.price {
font-size: 18px;
color: #8B5CF6;
font-weight: 600;
margin: 0;
}

.features {
list-style: none;
padding-left: 0;
margin: 0;
}

.features li {
padding: 8px 0;
border-bottom: 1px solid #24243a;
color: #d1d5db;
font-size: 14px;
}

.btn {
background: #8B5CF6;
color: white;
padding: 10px 20px;
border: none;
border-radius: 10px;
margin-top: auto;
align-self: flex-start;
font-weight: 600;
cursor: pointer;
transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
}

.btn:hover {
background: #7C3AED;
transform: translateY(-1px);
box-shadow: 0 8px 18px rgba(139, 92, 246, 0.35);
}
</style>
</head>
<body>

<div id="card-container"></div>

<script>
function renderCard(title, price, features) {
  const container = document.getElementById("card-container");

  if (!container) return;

  const featuresHtml = features
    .map(function (feature) {
      return "<li>" + feature + "</li>";
    })
    .join("");

  container.innerHTML =
    '<div class="pricing">' +
    '<h2 class="title">' + title + "</h2>" +
    '<p class="price">' + price + "</p>" +
    '<ul class="features">' + featuresHtml + "</ul>" +
    '<button class="btn">Start Trial</button>' +
    "</div>";
}

renderCard("Basic Plan", "$9.99 /month", [
  "1 GB Storage",
  "Basic Support",
  "All Core Features"
]);
</script>

</body>
</html>
